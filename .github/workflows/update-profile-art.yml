name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install daily deps
        run: pip install requests beautifulsoup4

      - name: Fetch contributions
        run: python scripts/fetch_contributions.py Bhavyashah20 data/contributions.json

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py data/contributions.json contrib-heatmap.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution heatmap [skip ci]"
          git push
